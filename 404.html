<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Gunjan Singh Pawar</title>
  <link rel="icon" type="image/x-icon" href="LOGO.SVG.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .not-found {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .not-found h1 {
      font-size: 10rem;
      line-height: 1;
      color: var(--accent-color);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="particles-bg"></div>
  <div class="custom-cursor"></div>
  
  <main class="not-found container">
    <h1 class="title-xl fade-up">404</h1>
    <h2 class="title-md fade-up" style="animation-delay: 0.1s; margin-bottom: 2rem;">Page Not Found</h2>
    <p class="fade-up" style="color: var(--text-secondary); margin-bottom: 3rem; max-width: 500px; animation-delay: 0.2s;">
      The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <div class="magnetic-wrap fade-up" style="animation-delay: 0.3s">
      <a href="index.html" class="btn btn-primary">Return Home <i class="fa-solid fa-arrow-right" style="margin-left: 10px;"></i></a>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.32/dist/lenis.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
